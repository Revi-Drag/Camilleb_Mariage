name: CamilleB-Mariage Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: linux

    steps:
      - name: Update repo
        run: |
          git config --global --add safe.directory /opt/apps/CamilleB-Mariage
          cd /opt/apps/CamilleB-Mariage
          git pull origin main

      - name: Build image
        run: |
          cd /opt/apps/CamilleB-Mariage
          docker compose build

      - name: Deploy
        run: |
          cd /opt/apps/CamilleB-Mariage
          docker compose up -d
