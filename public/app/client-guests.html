<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Invités - Camille B.</title>

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="/app/css/landing.css" />
    <script src="/app/js/client-guests.js" defer></script>
</head>

<body>
    <main class="client-page">
        <!-- HEADER CLIENT -->
        <header class="client-header">
            <nav class="client-nav" aria-label="Navigation espace client">
                <div class="client-nav-left">
                    <a href="/app/">Accueil</a>
                    <a href="/app/client-dashboard.html">Projets</a>
                    <a href="/app/client-guests.html">Invités</a>
                    <a href="/app/client-budget.html">Budget</a>
                    <a href="/app/client-tasks.html">Tâches</a>
                    <a href="/app/client-documents.html">Documents</a>
                    <a href="/app/client-settings.html">Paramètres</a>
                </div>

                <div class="client-nav-right">
                    <a href="/app/#contact">Contact</a>
                </div>
            </nav>
        </header>

        <!-- IDENTITÉ -->
        <section class="client-identity guests-identity" aria-label="Espace client">
            <div class="client-logo" aria-hidden="true">CB</div>
        </section>

        <!-- PAGE INVITÉS -->
        <section class="guests-shell" aria-labelledby="guests-title">
            <div class="guests-header">
                <h1 id="guests-title">Invités</h1>

                <button class="guests-add-button" type="button" id="openAddGuestButton">
                    + Ajouter un invité
                </button>
            </div>

            <div class="guests-search-row">
                <input id="guestSearchInput" class="guests-search-input" type="search"
                    placeholder="Rechercher un invité..." aria-label="Rechercher un invité" />

                <button class="guests-search-button" type="button" id="guestSearchButton">
                    Recherche invité
                </button>
            </div>

            <div class="guests-filter-row">
                <select id="guestStatusFilter" class="guests-filter-select" aria-label="Filtrer par statut">
                    <option value="ALL">Tous les statuts</option>
                    <option value="PENDING">En attente</option>
                    <option value="CONFIRMED">Confirmés</option>
                    <option value="REFUSED">Refusés</option>
                </select>
            </div>

            <div class="guests-table-wrapper">
                <table class="guests-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Statut</th>
                            <th>Commentaires</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="guestsTableBody">
                        <!-- Rempli par client-guests.js -->
                    </tbody>
                </table>
            </div>

            <section class="guests-stats" aria-label="Statistiques invités">
                <article class="guests-stat-card">
                    <strong id="guestsTotalCount">0</strong>
                    <span>Invités prévus</span>
                </article>

                <article class="guests-stat-card">
                    <strong id="guestsPendingCount">0</strong>
                    <span>En attente de réponse</span>
                </article>

                <article class="guests-stat-card">
                    <strong id="guestsRefusedCount">0</strong>
                    <span>Invitations refusées</span>
                </article>

                <article class="guests-stat-card">
                    <strong id="guestsConfirmedCount">0</strong>
                    <span>Confirmés</span>
                </article>
            </section>
        </section>

        <!-- MODALE AJOUT / MODIFICATION -->
        <div class="guest-modal hidden" id="guestModal" role="dialog" aria-modal="true"
            aria-labelledby="guestModalTitle">
            <div class="guest-modal-backdrop" id="guestModalBackdrop"></div>

            <section class="guest-modal-card">
                <div class="guest-modal-header">
                    <h2 id="guestModalTitle">Ajouter un invité</h2>

                    <button type="button" class="guest-modal-close" id="closeGuestModalButton" aria-label="Fermer">
                        ×
                    </button>
                </div>

                <form id="guestForm" class="guest-form">
                    <input type="hidden" id="guestId" />

                    <div class="guest-form-group">
                        <label for="guestName">Nom</label>
                        <input id="guestName" type="text" required placeholder="Ex : Jean Dupont" />
                    </div>

                    <div class="guest-form-group">
                        <label for="guestEmail">Email</label>
                        <input id="guestEmail" type="email" placeholder="Ex : jean.dupont@email.fr" />
                    </div>

                    <div class="guest-form-group">
                        <label for="guestPhone">Téléphone</label>
                        <input id="guestPhone" type="tel" placeholder="Ex : 06 12 34 56 78" />
                    </div>

                    <div class="guest-form-group">
                        <label for="guestFoodRestrictions">Contraintes alimentaires</label>
                        <input id="guestFoodRestrictions" type="text"
                            placeholder="Ex : végétarien, allergie poissons..." />
                    </div>

                    <div class="guest-form-group">
                        <label for="guestStatus">Statut</label>
                        <select id="guestStatus">
                            <option value="PENDING">En attente</option>
                            <option value="CONFIRMED">Confirmé</option>
                            <option value="REFUSED">Refusé</option>
                        </select>
                    </div>

                    <div class="guest-form-group">
                        <label for="guestComment">Commentaires</label>
                        <textarea id="guestComment" rows="3"
                            placeholder="Ex : côté famille mariée, témoin, information utile..."></textarea>
                    </div>

                    <div class="guest-form-actions">
                        <button type="button" class="guest-cancel-button" id="cancelGuestButton">
                            Annuler
                        </button>

                        <button type="submit" class="guest-save-button">
                            Enregistrer
                        </button>
                    </div>
                </form>
            </section>
        </div>
    </main>
</body>

</html>
