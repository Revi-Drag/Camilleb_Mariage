<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Connexion - Camille B.</title>

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="/app/css/landing.css" />
    <script src="/app/js/login.js" defer></script>
</head>

<body>
    <main class="landing-page login-page">
        <!-- HEADER -->
        <header class="landing-header">
            <a href="/app/" class="brand" aria-label="Accueil Camille B.">
                <span class="brand-title">Camille B.</span>
                <span class="brand-subtitle">Conseillère mariage</span>
            </a>

            <nav class="main-nav" aria-label="Navigation principale">
                <a href="/app/">Accueil</a>
                <a href="/app/#prestations">Prestations</a>
                <a href="/app/#avis">Avis</a>
                <a href="/app/#contact">Contact</a>
            </nav>
        </header>

        <!-- CONNEXION -->
        <section class="login-section">
            <article class="login-card" aria-labelledby="login-title">
                <h1 id="login-title" class="login-title">Connexion espace client</h1>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email" class="sr-only">Adresse email</label>
                        <input id="email" name="email" type="email" autocomplete="email" placeholder="Login..."
                            required />
                    </div>

                    <div class="form-group">
                        <label for="password" class="sr-only">Mot de passe</label>
                        <input id="password" name="password" type="password" autocomplete="current-password"
                            placeholder="Password..." required />
                    </div>

                    <div class="login-help-row">
                        <a href="#" class="forgot-password">Mot de passe oublié</a>

                        <button type="submit" class="btn-login">
                            Connexion
                        </button>
                    </div>

                    <p id="loginMessage" class="login-message" aria-live="polite"></p>
                </form>

                <button type="button" class="btn-login-main" data-action="appointment">
                    Demander un rendez-vous
                </button>
            </article>
        </section>
    </main>
</body>

</html>
